<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cave de Malta 🍷</title>

<style>

body{
margin:0;
padding:20px;
font-family:Georgia,serif;
background:#120b0d;
color:white;
}

.container{
max-width:460px;
margin:auto;
background:#1d1518;
padding:22px;
border-radius:25px;
box-shadow:0 0 25px rgba(212,175,55,.25);
}

.logo{
text-align:center;
font-size:34px;
font-weight:bold;
color:#d4af37;
}

.frase{
text-align:center;
color:#c9b8a0;
margin-bottom:25px;
font-style:italic;
}

h2{
color:#d4af37;
border-bottom:1px solid #6b1e2b;
padding-bottom:8px;
}

label{
color:#d4af37;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:13px;
margin:8px 0 15px;
border-radius:12px;
border:1px solid #6b1e2b;
background:#2a2023;
color:white;
box-sizing:border-box;
}

textarea{
height:90px;
}

button{
width:100%;
padding:15px;
background:#6b1e2b;
color:white;
border:0;
border-radius:14px;
font-size:17px;
font-weight:bold;
margin-top:10px;
}

.card{
background:#261b1f;
margin-top:25px;
padding:18px;
border-radius:18px;
border:1px solid #d4af37;
}

.card img{
width:100%;
border-radius:12px;
}

.nota{
font-size:28px;
color:#d4af37;
text-align:center;
}

.compartilhar{
background:#2d6a4f;
}

.excluir{
background:#444;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
🍷 Cave de Malta
</div>

<div class="frase">
Minha adega digital e avaliação de vinhos
</div>

<h2>Cadastro do vinho</h2>

<label>Nome do vinho</label>
<input id="nome">

<label>Vinícola</label>
<input id="vinicola">

<label>Tipo</label>
<select id="tipo">
<option>Tinto</option>
<option>Branco</option>
<option>Rosé</option>
<option>Espumante</option>
</select>

<label>Uva</label>
<input id="uva">

<label>Safra</label>
<input id="safra">

<label>País / Região</label>
<input id="regiao">

<label>Foto do rótulo</label>
<input id="foto" type="file" accept="image/*">
<label>Teor alcoólico</label>
<input id="alcool" placeholder="Ex: 13,5%">


<label>Valor pago</label>
<input id="valor" placeholder="R$">


<label>Quantidade de garrafas</label>
<input id="quantidade" type="number">


<label>Local na adega</label>
<input id="local" placeholder="Ex: Prateleira 1">


<h2>Avaliação Visual 👁</h2>

<label>Cor</label>
<input id="cor" placeholder="Ex: Rubi intenso">

<label>Intensidade</label>
<input id="visual" placeholder="Ex: Brilhante">


<h2>Aromas 👃</h2>

<label>Frutas</label>
<input id="frutas">

<label>Flores</label>
<input id="flores">

<label>Especiarias</label>
<input id="especiarias">

<label>Madeira</label>
<input id="madeira">

<label>Minerais</label>
<input id="minerais">


<h2>Gustativo 👅</h2>

<label>Corpo</label>
<input id="corpo">

<label>Acidez</label>
<input id="acidez">

<label>Taninos</label>
<input id="tanino">

<label>Final</label>
<input id="final">


<label>Nota final (0 a 100)</label>
<input id="notaFinal" type="number" min="0" max="100">


<label>Harmonização 🍽</label>
<textarea id="harmonizacao"></textarea>


<button onclick="salvarVinho()">
Salvar avaliação 🍷
</button>


<div id="lista"></div>

</div>
<script>

let imagemBase64 = "";

document.getElementById("foto").addEventListener("change", function(e){

let arquivo = e.target.files[0];

if(arquivo){

let leitor = new FileReader();

leitor.onload=function(){

imagemBase64 = leitor.result;

}

leitor.readAsDataURL(arquivo);

}

});


function salvarVinho(){

let vinho={

nome:document.getElementById("nome").value,
vinicola:document.getElementById("vinicola").value,
tipo:document.getElementById("tipo").value,
uva:document.getElementById("uva").value,
safra:document.getElementById("safra").value,
regiao:document.getElementById("regiao").value,

alcool:document.getElementById("alcool").value,
valor:document.getElementById("valor").value,
quantidade:document.getElementById("quantidade").value,
local:document.getElementById("local").value,

foto:imagemBase64,

cor:document.getElementById("cor").value,
visual:document.getElementById("visual").value,

frutas:document.getElementById("frutas").value,
flores:document.getElementById("flores").value,
especiarias:document.getElementById("especiarias").value,
madeira:document.getElementById("madeira").value,
minerais:document.getElementById("minerais").value,

corpo:document.getElementById("corpo").value,
acidez:document.getElementById("acidez").value,
tanino:document.getElementById("tanino").value,
final:document.getElementById("final").value,

notaFinal:document.getElementById("notaFinal").value,

harmonizacao:document.getElementById("harmonizacao").value

};


let vinhos=JSON.parse(localStorage.getItem("CaveMalta")) || [];

vinhos.push(vinho);

localStorage.setItem("CaveMalta",JSON.stringify(vinhos));


alert("Vinho salvo na Cave de Malta 🍷");

mostrarVinhos();

}



function mostrarVinhos(){

let lista=document.getElementById("lista");

lista.innerHTML="";


let vinhos=JSON.parse(localStorage.getItem("CaveMalta")) || [];


vinhos.forEach((v,index)=>{

lista.innerHTML +=`

<div class="card">

${v.foto ? `<img src="${v.foto}">` : ""}

<h2>${v.nome}</h2>

<p><b>Vinícola:</b> ${v.vinicola}</p>

<p><b>${v.tipo}</b> | ${v.uva}</p>

<p><b>Safra:</b> ${v.safra}</p>

<p>${v.regiao}</p>

<div class="nota">
⭐ ${v.notaFinal}/100
</div>

<p>
<b>Aromas:</b><br>
${v.frutas} ${v.flores} ${v.especiarias}
</p>


<p>
<b>Paladar:</b><br>
Corpo: ${v.corpo}<br>
Acidez: ${v.acidez}<br>
Taninos: ${v.tanino}<br>
Final: ${v.final}
</p>


<p>
<b>Harmonização:</b><br>
${v.harmonizacao}
</p>


<p>
🍷 <b>Avaliado por: Willian Malta</b>
</p>


<button class="compartilhar" onclick="compartilhar(${index})">
Compartilhar ficha 📲
</button>


<button class="excluir" onclick="excluirVinho(${index})">
Excluir
</button>


</div>

`;

});

}



function compartilhar(index){

let vinhos=JSON.parse(localStorage.getItem("CaveMalta")) || [];

let v=vinhos[index];


let texto=

`🍷 Cave de Malta

${v.nome}
Vinícola: ${v.vinicola}
Safra: ${v.safra}

⭐ Nota: ${v.notaFinal}/100

Aromas:
${v.frutas}, ${v.flores}, ${v.especiarias}

Harmonização:
${v.harmonizacao}

Avaliado por: Willian Malta`;


if(navigator.share){

navigator.share({

title:"Cave de Malta",

text:texto

});

}else{

alert(texto);

}

}



function excluirVinho(index){

let vinhos=JSON.parse(localStorage.getItem("CaveMalta")) || [];

vinhos.splice(index,1);

localStorage.setItem("CaveMalta",JSON.stringify(vinhos));

mostrarVinhos();

}


mostrarVinhos();


</script>

</body>
</html>
