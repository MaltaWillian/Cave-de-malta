<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cave de Malta 🍷</title>

<style>

body{
margin:0;
padding:20px;
font-family:Georgia,serif;
background:#120b0d;
color:white;
}

.container{
max-width:460px;
margin:auto;
background:#1d1518;
padding:22px;
border-radius:25px;
box-shadow:0 0 25px rgba(212,175,55,.25);
}

.logo{
text-align:center;
font-size:34px;
font-weight:bold;
color:#d4af37;
}

.frase{
text-align:center;
color:#c9b8a0;
font-style:italic;
margin-bottom:25px;
}

h2{
color:#d4af37;
border-bottom:1px solid #6b1e2b;
padding-bottom:8px;
}

label{
color:#d4af37;
font-weight:bold;
}

input,select,textarea{

width:100%;
padding:13px;
margin:8px 0 15px;
border-radius:12px;
border:1px solid #6b1e2b;
background:#2a2023;
color:white;
box-sizing:border-box;

}

textarea{
height:90px;
}

button{

width:100%;
padding:15px;
background:#6b1e2b;
color:white;
border:0;
border-radius:14px;
font-size:17px;
font-weight:bold;
margin-top:10px;

}

.card{

background:#261b1f;
margin-top:25px;
padding:18px;
border-radius:18px;
border:1px solid #d4af37;

}

.card img{

width:100%;
border-radius:12px;

}

.nota{

font-size:28px;
color:#d4af37;
text-align:center;

}

.compartilhar{

background:#2d6a4f;

}

.excluir{

background:#444;

}

</style>

</head>


<body>


<div class="container">


<div class="logo">
🍷 Cave de Malta
</div>


<div class="frase">
Minha jornada pelo mundo dos vinhos
</div>


<h2>Cadastro do vinho</h2>


<label>Nome do vinho</label>
<input id="nome" placeholder="Ex: Malbec Reserva">


<label>Vinícola</label>
<input id="vinicola" placeholder="Nome da vinícola">


<label>Tipo de vinho</label>

<select id="tipo">

<option>Tinto</option>
<option>Branco</option>
<option>Rosé</option>
<option>Espumante</option>

</select>


<label>Uva</label>
<input id="uva" placeholder="Ex: Cabernet Sauvignon">


<label>Safra</label>
<input id="safra" placeholder="Ex: 2020">


<label>País</label>

<select id="pais">

<option value="🇧🇷 Brasil">🇧🇷 Brasil</option>
<option value="🇦🇷 Argentina">🇦🇷 Argentina</option>
<option value="🇨🇱 Chile">🇨🇱 Chile</option>
<option value="🇺🇾 Uruguai">🇺🇾 Uruguai</option>
<option value="🇫🇷 França">🇫🇷 França</option>
<option value="🇮🇹 Itália">🇮🇹 Itália</option>
<option value="🇵🇹 Portugal">🇵🇹 Portugal</option>
<option value="🇪🇸 Espanha">🇪🇸 Espanha</option>

</select>


<label>Região</label>
<input id="regiao" placeholder="Ex: Serra Gaúcha">


<label>Foto do rótulo</label>
<input id="foto" type="file" accept="image/*">


<label>Teor alcoólico</label>
<input id="alcool" placeholder="Ex: 13,5%">


<label>Valor pago</label>
<input id="valor" placeholder="R$">
<h2>Avaliação visual 👁</h2>

<label>Cor</label>
<input id="cor" placeholder="Ex: Rubi intenso">


<label>Intensidade</label>
<input id="visual" placeholder="Ex: Brilhante">


<h2>Aromas 👃</h2>


<label>Frutas</label>
<input id="frutas" placeholder="Ex: Frutas vermelhas">


<label>Flores</label>
<input id="flores" placeholder="Ex: Violetas">


<label>Especiarias</label>
<input id="especiarias" placeholder="Ex: Pimenta, baunilha">


<label>Madeira</label>
<input id="madeira" placeholder="Ex: Carvalho">


<label>Minerais</label>
<input id="minerais" placeholder="Ex: Grafite">


<h2>Paladar 👅</h2>


<label>Corpo</label>
<select id="corpo">

<option>Leve</option>
<option>Médio</option>
<option>Encorpado</option>

</select>


<label>Acidez</label>
<select id="acidez">

<option>Baixa</option>
<option>Equilibrada</option>
<option>Alta</option>

</select>


<label>Taninos</label>
<select id="tanino">

<option>Suaves</option>
<option>Presentes</option>
<option>Intensos</option>

</select>


<label>Final</label>
<select id="final">

<option>Curto</option>
<option>Médio</option>
<option>Longo</option>

</select>


<label>Nota final (0 a 100)</label>
<input id="notaFinal" type="number" min="0" max="100" placeholder="Ex: 92">


<label>Harmonização 🍽</label>
<textarea id="harmonizacao" placeholder="Carnes, massas, queijos..."></textarea>


<h2>Quem avaliou?</h2>


<label>Nome do avaliador</label>
<input id="avaliador" placeholder="Digite seu nome">


<button onclick="salvarVinho()">
Salvar avaliação 🍷
</button>


<div id="lista"></div>


</div>
<script>

let imagemBase64 = "";


// Conversão da foto para salvar
document.getElementById("foto").addEventListener("change", function(e){

let arquivo = e.target.files[0];

if(arquivo){

let leitor = new FileReader();

leitor.onload=function(){

imagemBase64 = leitor.result;

}

leitor.readAsDataURL(arquivo);

}

});


// Salva campos vazios como N/C
function nc(valor){

if(valor == "" || valor == null){

return "N/C";

}

return valor;

}



function salvarVinho(){


let vinho = {


nome: nc(document.getElementById("nome").value),

vinicola: nc(document.getElementById("vinicola").value),

tipo: nc(document.getElementById("tipo").value),

uva: nc(document.getElementById("uva").value),

safra: nc(document.getElementById("safra").value),


pais: nc(document.getElementById("pais").value),

regiao: nc(document.getElementById("regiao").value),


alcool: nc(document.getElementById("alcool").value),

valor: nc(document.getElementById("valor").value),


foto: imagemBase64,


cor: nc(document.getElementById("cor").value),

visual: nc(document.getElementById("visual").value),


frutas: nc(document.getElementById("frutas").value),

flores: nc(document.getElementById("flores").value),

especiarias: nc(document.getElementById("especiarias").value),

madeira: nc(document.getElementById("madeira").value),

minerais: nc(document.getElementById("minerais").value),


corpo: nc(document.getElementById("corpo").value),

acidez: nc(document.getElementById("acidez").value),

tanino: nc(document.getElementById("tanino").value),

final: nc(document.getElementById("final").value),


notaFinal: nc(document.getElementById("notaFinal").value),


harmonizacao: nc(document.getElementById("harmonizacao").value),


avaliador: nc(document.getElementById("avaliador").value)


};



let vinhos = JSON.parse(localStorage.getItem("CaveMalta")) || [];


vinhos.push(vinho);


localStorage.setItem("CaveMalta", JSON.stringify(vinhos));


alert("Vinho salvo na Cave de Malta 🍷");


mostrarVinhos();


}
function mostrarVinhos(){


let lista = document.getElementById("lista");

lista.innerHTML = "";


let vinhos = JSON.parse(localStorage.getItem("CaveMalta")) || [];


vinhos.forEach((v,index)=>{


lista.innerHTML += `

<div class="card">


${v.foto ? `<img src="${v.foto}">` : ""}


<h2>${v.nome}</h2>


<p>
<b>${v.pais}</b> - ${v.regiao}
</p>


<p>
${v.tipo} | ${v.uva} | Safra ${v.safra}
</p>


<div class="nota">
⭐ ${v.notaFinal}/100
</div>


<p>
<b>Aromas:</b><br>
${v.frutas}, ${v.flores}, ${v.especiarias}, ${v.madeira}
</p>


<p>
<b>Paladar:</b><br>

Corpo: ${v.corpo}<br>

Acidez: ${v.acidez}<br>

Taninos: ${v.tanino}<br>

Final: ${v.final}

</p>


<p>
<b>Harmonização:</b><br>

${v.harmonizacao}

</p>


<p>
🍷 <b>Avaliado por: ${v.avaliador}</b>
</p>



<button class="compartilhar" onclick="compartilhar(${index})">

Compartilhar ficha 📲

</button>



<button class="excluir" onclick="excluirVinho(${index})">

Excluir

</button>



</div>

`;

});


}





function compartilhar(index){


let vinhos = JSON.parse(localStorage.getItem("CaveMalta")) || [];


let v = vinhos[index];


let texto =

`🍷 Cave de Malta


${v.nome}


${v.pais} - ${v.regiao}


${v.tipo}

Uva: ${v.uva}

Safra: ${v.safra}


⭐ Nota: ${v.notaFinal}/100


Aromas:

${v.frutas}, ${v.flores}, ${v.especiarias}


Harmonização:

${v.harmonizacao}


🍷 Avaliado por: ${v.avaliador}`;



if(navigator.share){


navigator.share({

title:"Cave de Malta",

text:texto

});


}else{


alert(texto);


}


}





function excluirVinho(index){


let vinhos = JSON.parse(localStorage.getItem("CaveMalta")) || [];


vinhos.splice(index,1);


localStorage.setItem("CaveMalta", JSON.stringify(vinhos));


mostrarVinhos();


}

console.log(vinho);
alert("Salvou!");

</script>


</body>

</html>
</script>

</body>

</html>
