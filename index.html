<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cave de Malta 🍷</title>

<style>

body {
    margin:0;
    padding:20px;
    font-family: Arial, sans-serif;
    background:#efe7dc;
}

.container {
    max-width:450px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
}

.logo {
    text-align:center;
    color:#6b1e2b;
    font-size:28px;
    font-weight:bold;
}

.subtitulo {
    text-align:center;
    color:#555;
    margin-bottom:20px;
}

label {
    font-weight:bold;
    color:#333;
}

input, textarea, select {
    width:100%;
    padding:12px;
    margin-top:6px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

textarea {
    height:90px;
}

button {
    width:100%;
    padding:14px;
    background:#6b1e2b;
    color:white;
    border:0;
    border-radius:12px;
    font-size:17px;
}

.card {
    margin-top:20px;
    background:#f8f3ec;
    padding:15px;
    border-radius:15px;
}

.card img {
    width:100%;
    border-radius:10px;
}

.nota {
    font-size:22px;
    color:#6b1e2b;
    font-weight:bold;
}

.excluir {
    background:#333;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
🍷 Cave de Malta
</div>

<div class="subtitulo">
Minha adega digital
</div>


<label>Nome do vinho</label>
<input id="nome" placeholder="Ex: Cabernet Sauvignon Reserva">


<label>Vinícola</label>
<input id="vinicola" placeholder="Ex: Vinícola X">


<label>Safra</label>
<input id="safra" placeholder="2020">


<label>País / Região</label>
<input id="regiao" placeholder="Brasil - Serra Gaúcha">


<label>Valor pago</label>
<input id="valor" placeholder="R$">


<label>Local na adega</label>
<input id="local" placeholder="Prateleira 1">


<label>Foto do rótulo</label>
<input id="foto" type="file" accept="image/*">


<label>Notas de degustação</label>
<textarea id="nota" placeholder="Aromas, sabores, final..."></textarea>
<label>Nota do vinho (0 a 100)</label>
<input id="avaliacao" type="number" min="0" max="100" placeholder="Ex: 92">


<label>Harmonização</label>
<textarea id="harmonizacao" placeholder="Carnes, massas, queijos..."></textarea>


<button onclick="salvarVinho()">
Salvar vinho 🍷
</button>


<div id="lista"></div>

</div>


<script>

let imagemBase64 = "";

document.getElementById("foto").addEventListener("change", function(e){

let arquivo = e.target.files[0];

if(arquivo){

let leitor = new FileReader();

leitor.onload=function(){

imagemBase64 = leitor.result;

}

leitor.readAsDataURL(arquivo);

}

});


function salvarVinho(){

let vinho = {

nome: document.getElementById("nome").value,

vinicola: document.getElementById("vinicola").value,

safra: document.getElementById("safra").value,

regiao: document.getElementById("regiao").value,

valor: document.getElementById("valor").value,

local: document.getElementById("local").value,

nota: document.getElementById("nota").value,

avaliacao: document.getElementById("avaliacao").value,

harmonizacao: document.getElementById("harmonizacao").value,

foto: imagemBase64

};


let vinhos = JSON.parse(localStorage.getItem("caveMalta")) || [];


vinhos.push(vinho);


localStorage.setItem("caveMalta", JSON.stringify(vinhos));


alert("Vinho guardado na Cave de Malta 🍷");


mostrarVinhos();


}



function mostrarVinhos(){


let lista=document.getElementById("lista");

lista.innerHTML="";


let vinhos=JSON.parse(localStorage.getItem("caveMalta")) || [];


vinhos.forEach((v,index)=>{


lista.innerHTML += `

<div class="card">


${v.foto ? `<img src="${v.foto}">` : ""}


<h3>${v.nome}</h3>


<p><b>Vinícola:</b> ${v.vinicola}</p>

<p><b>Safra:</b> ${v.safra}</p>

<p><b>Região:</b> ${v.regiao}</p>

<p><b>Local:</b> ${v.local}</p>

<p>${v.nota}</p>

<div class="nota">
⭐ ${v.avaliacao}/100
</div>


<p><b>Harmonização:</b><br>${v.harmonizacao}</p>


<button class="excluir" onclick="excluirVinho(${index})">
Excluir
</button>


</div>

`;

});


}



function excluirVinho(index){

let vinhos=JSON.parse(localStorage.getItem("caveMalta")) || [];


vinhos.splice(index,1);


localStorage.setItem("caveMalta", JSON.stringify(vinhos));


mostrarVinhos();

}


mostrarVinhos();


</script>


</body>
</html>
