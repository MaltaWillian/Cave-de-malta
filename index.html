<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=
 <title>Cave de Malta 🍷</title>
    <style>

body {
    margin:0;
    padding:20px;
    font-family: Georgia, serif;
    background:#120b0d;
    color:#eee;
}

.container {
    max-width:460px;
    margin:auto;
    background:#1d1518;
    padding:22px;
    border-radius:25px;
    box-shadow:0 0 25px rgba(212,175,55,.25);
}

.logo {
    text-align:center;
    color:#d4af37;
    font-size:34px;
    font-weight:bold;
    letter-spacing:1px;
}

.frase {
    text-align:center;
    color:#c9b8a0;
    margin-bottom:30px;
    font-style:italic;
}

h2 {
    color:#d4af37;
    border-bottom:1px solid #6b1e2b;
    padding-bottom:8px;
}

label {
    color:#d4af37;
    font-weight:bold;
}

input, select, textarea {
    width:100%;
    padding:13px;
    margin:8px 0 16px;
    border-radius:12px;
    border:1px solid #6b1e2b;
    background:#2a2023;
    color:white;
    box-sizing:border-box;
}

textarea {
    height:90px;
}

button {
    width:100%;
    padding:15px;
    background:#6b1e2b;
    color:#fff;
    border:none;
    border-radius:14px;
    font-size:17px;
    font-weight:bold;
}

.card {
    background:#261b1f;
    margin-top:25px;
    padding:18px;
    border-radius:18px;
    border:1px solid #d4af37;
}

.card img {
    width:100%;
    border-radius:12px;
}

.nota {
    font-size:28px;
    color:#d4af37;
    text-align:center;
    margin:15px 0;
}

.compartilhar {
    background:#2d6a4f;
}

.excluir {
    background:#444;
}

</style>
</head>

    
<body>

<div class="container">

<div class="logo">
🍷 Cave de Malta
</div>

<div class="frase">
Minha adega digital e avaliação de vinhos
</div>


<h2>Cadastro do vinho</h2>


<label>Nome do vinho</label>
<input id="nome" placeholder="Ex: Malbec Reserva">


<label>Vinícola</label>
<input id="vinicola" placeholder="Nome da vinícola">


<label>Tipo</label>
<select id="tipo">
<option>Tinto</option>
<option>Branco</option>
<option>Rosé</option>
<option>Espumante</option>
</select>


<label>Uva</label>
<input id="uva" placeholder="Ex: Cabernet Sauvignon">


<label>Safra</label>
<input id="safra" placeholder="Ano">


<label>País / Região</label>
<input id="regiao" placeholder="Ex: Brasil - Serra Gaúcha">


<label>Foto do rótulo</label>
<input id="foto" type="file" accept="image/*">
<label>Teor alcoólico</label>
<input id="alcool" placeholder="Ex: 13,5%"> 


<label>Valor pago</label>
<input id="valor" placeholder="R$">


<label>Quantidade de garrafas</label>
<input id="quantidade" type="number" placeholder="Ex: 2">


<label>Local na adega</label>
<input id="local" placeholder="Ex: Prateleira 1">


<h2>Avaliação visual</h2>

<label>Cor</label>
<input id="cor" placeholder="Ex: Rubi intenso">


<label>Intensidade visual</label>
<input id="visual" placeholder="Ex: Brilhante">


<h2>Aromas 👃</h2>

<label>Frutas</label>
<input id="frutas" placeholder="Ex: Frutas vermelhas">


<label>Flores</label>
<input id="flores" placeholder="Ex: Violetas">


<label>Especiarias</label>
<input id="especiarias" placeholder="Ex: Pimenta, baunilha">


<label>Madeira</label>
<input id="madeira" placeholder="Ex: Carvalho">


<label>Minerais</label>
<input id="minerais" placeholder="Ex: Pedras, grafite">


<h2>Gustativo 👅</h2>

<label>Corpo</label>
<input id="corpo" placeholder="Ex: Médio">


<label>Acidez</label>
<input id="acidez" placeholder="Ex: Equilibrada">


<label>Taninos</label>
<input id="tanino" placeholder="Ex: Macios">


<label>Final</label>
<input id="final" placeholder="Ex: Longo e elegante">


<label>Nota final (0 a 100)</label>
<input id="notaFinal" type="number" min="0" max="100" placeholder="Ex: 92">


<label>Harmonização</label>
<textarea id="harmonizacao" placeholder="Carnes, massas, queijos..."></textarea>


<button onclick="salvarVinho()">
Salvar avaliação 🍷
</button>


<div id="lista"></div>

</div>
<script>

let imagemBase64 = "";

document.getElementById("foto").addEventListener("change", function(e){

let arquivo = e.target.files[0];

if(arquivo){

let leitor = new FileReader();

leitor.onload=function(){

imagemBase64 = leitor.result;

}

leitor.readAsDataURL(arquivo);

}

});


function salvarVinho(){

let vinho = {

nome: nome.value,
vinicola: vinicola.value,
tipo: tipo.value,
uva: uva.value,
safra: safra.value,
regiao: regiao.value,
alcool: alcool.value,
valor: valor.value,
quantidade: quantidade.value,
local: local.value,

foto: imagemBase64,

cor: cor.value,
visual: visual.value,

frutas: frutas.value,
flores: flores.value,
especiarias: especiarias.value,
madeira: madeira.value,
minerais: minerais.value,

corpo: corpo.value,
acidez: acidez.value,
tanino: tanino.value,
final: final.value,

notaFinal: notaFinal.value,
harmonizacao: harmonizacao.value

};


let vinhos = JSON.parse(localStorage.getItem("CaveMalta")) || [];

vinhos.push(vinho);

localStorage.setItem("CaveMalta", JSON.stringify(vinhos));


alert("Avaliação salva na Cave de Malta 🍷");


mostrarVinhos();

}



function mostrarVinhos(){

let lista=document.getElementById("lista");

lista.innerHTML="";


let vinhos=JSON.parse(localStorage.getItem("CaveMalta")) || [];


vinhos.forEach((v,index)=>{


lista.innerHTML += `

<div class="card">

${v.foto ? `<img src="${v.foto}">` : ""}

<h2>${v.nome}</h2>

<p><b>Vinícola:</b> ${v.vinicola}</p>

<p><b>Tipo:</b> ${v.tipo}</p>

<p><b>Uva:</b> ${v.uva}</p>

<p><b>Safra:</b> ${v.safra}</p>

<p><b>Região:</b> ${v.regiao}</p>


<div class="nota">
⭐ ${v.notaFinal}/100
</div>


<p><b>Aromas:</b><br>
${v.frutas} ${v.flores} ${v.especiarias} ${v.madeira} ${v.minerais}
</p>


<p><b>Gustativo:</b><br>
Corpo: ${v.corpo}<br>
Acidez: ${v.acidez}<br>
Taninos: ${v.tanino}<br>
Final: ${v.final}
</p>


<p><b>Harmonização:</b><br>
${v.harmonizacao}
</p>


<p>
<b>Avaliado por: Willian Malta</b>
</p>


<button class="compartilhar" onclick="compartilhar(${index})">
Compartilhar ficha 📲
</button>


<button class="excluir" onclick="excluir(${index})">
Excluir
</button>


</div>

`;

});

}



function compartilhar(index){

let vinhos=JSON.parse(localStorage.getItem("CaveMalta")) || [];

let v=vinhos[index];


let texto = `🍷 Cave de Malta

${v.nome}
Vinícola: ${v.vinicola}
Safra: ${v.safra}
Nota: ⭐ ${v.notaFinal}/100

Aromas:
${v.frutas}, ${v.flores}, ${v.especiarias}

Harmonização:
${v.harmonizacao}

Avaliado por: Willian Malta`;


if(navigator.share){

navigator.share({

title:"Cave de Malta",

text:texto

});

}else{

alert(texto);

}

}



function excluir(index){

let vinhos=JSON.parse(localStorage.getItem("CaveMalta")) || [];

vinhos.splice(index,1);

localStorage.setItem("CaveMalta", JSON.stringify(vinhos));

mostrarVinhos();

}


mostrarVinhos();


</script>

</body>
</html>
